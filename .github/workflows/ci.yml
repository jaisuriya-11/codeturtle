name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines.node is >=22.12 (commander 15 / ink 7 floor); test the floor and current
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Typecheck (also covers co-located tests)
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test (with coverage thresholds)
        run: npm run test:cov
